<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projects</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      padding: 48px 24px;
    }
    h1 {
      font-size: 24px;
      font-weight: 600;
      color: #111;
      margin-bottom: 32px;
    }
    .list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-width: 480px;
    }
    .item {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }
    .num {
      font-size: 14px;
      color: #999;
      min-width: 20px;
    }
    .name {
      font-size: 16px;
      font-weight: 500;
      color: #111;
      flex: 1;
    }
    .link a {
      font-size: 14px;
      color: #0066cc;
      text-decoration: none;
    }
    .link a:hover {
      text-decoration: underline;
    }
    /* Moth */
    .moth-wrapper {
      position: fixed;
      bottom: 28px;
      right: 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      user-select: none;
      pointer-events: none;
    }
    .moth-bubble {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 12px;
      padding: 8px 12px;
      font-size: 12px;
      color: #555;
      max-width: 160px;
      text-align: center;
      line-height: 1.4;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      position: relative;
      opacity: 0;
      transform: translateY(4px);
      transition: opacity 0.4s ease, transform 0.4s ease;
    }
    .moth-bubble.visible {
      opacity: 1;
      transform: translateY(0);
    }
    .moth-bubble::after {
      content: "";
      position: absolute;
      bottom: -7px;
      left: 50%;
      transform: translateX(-50%);
      border: 7px solid transparent;
      border-top-color: #e0e0e0;
      border-bottom: none;
    }
    .moth-bubble::before {
      content: "";
      position: absolute;
      bottom: -6px;
      left: 50%;
      transform: translateX(-50%);
      border: 7px solid transparent;
      border-top-color: #fff;
      border-bottom: none;
      z-index: 1;
    }
    .moth-ghost {
      animation: moth-float 3s ease-in-out infinite;
      cursor: default;
    }
    @keyframes moth-float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-6px); }
    }
  </style>
</head>
<body>
  <h1>Projects</h1>
  <div class="list">
    <div class="item">
      <span class="num">1</span>
      <span class="name">booking</span>
      <span class="link"><a href="http://72.56.126.248:8084" target="_blank">72.56.126.248:8084</a></span>
    </div>
    <div class="item">
      <span class="num">2</span>
      <span class="name">ai_gateway</span>
      <span class="link"><a href="http://72.56.126.248:8085" target="_blank">72.56.126.248:8085</a></span>
    </div>
    <div class="item">
      <span class="num">3</span>
      <span class="name">json-formatter</span>
      <span class="link"><a href="http://72.56.126.248:8081" target="_blank">72.56.126.248:8081</a></span>
    </div>
  </div>

  <!-- Moth -->
  <div class="moth-wrapper">
    <div class="moth-bubble" id="moth-bubble"></div>
    <svg class="moth-ghost" width="48" height="56" viewBox="0 0 48 56" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- body -->
      <path d="M4 24C4 12.954 13.163 4 24 4C34.837 4 44 12.954 44 24V44C44 44 40 40 36 44C32 48 28 44 24 44C20 44 16 48 12 44C8 40 4 44 4 44V24Z" fill="#d8d0f0" stroke="#b8aee0" stroke-width="1.5"/>
      <!-- eyes -->
      <ellipse cx="17" cy="24" rx="3" ry="3.5" fill="#333"/>
      <ellipse cx="31" cy="24" rx="3" ry="3.5" fill="#333"/>
      <!-- eye shine -->
      <circle cx="18.2" cy="22.5" r="1" fill="white"/>
      <circle cx="32.2" cy="22.5" r="1" fill="white"/>
    </svg>
  </div>

  <script>
    const phrases = [
      "всё под контролем",
      "проект номер три — любимчик",
      "тихо тут сегодня",
      "я слежу",
      "хороший список",
      "booking... интересно",
    ];
    const bubble = document.getElementById("moth-bubble");
    let idx = Math.floor(Math.random() * phrases.length);

    function show() {
      bubble.textContent = phrases[idx];
      bubble.classList.add("visible");
      idx = (idx + 1) % phrases.length;
      setTimeout(hide, 4000);
    }
    function hide() {
      bubble.classList.remove("visible");
      setTimeout(show, 8000 + Math.random() * 6000);
    }

    setTimeout(show, 2000);
  </script>
</body>
</html>
