<!DOCTYPE html>
<html lang="ru">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projects</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

      display: flex;
      flex-direction: column;

      max-width: 480px;
    }
    .item {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;

    .num {
      font-size: 14px;
      color: #999;
      min-width: 20px;
    }
    .name {
      font-size: 16px;
      font-weight: 500;
      color: #111;
      flex: 1;
    }
    .link a {
      font-size: 14px;
      color: #0066cc;
      text-decoration: none;
    }
    .link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
